<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SRS Generator - Login</title>
    <link rel="stylesheet" type="text/css" href="./Frontend/main/style.css" />
  </head>
  <body>
    <div id="container">
      <div id="header">
        <h1>Automated Software Requirements Specification Generator</h1>
      </div>

      <div id="tab-buttons">
        <button id="login-tab" class="tab-btn active">Login</button>
        <button id="signup-tab" class="tab-btn">Sign Up</button>
      </div>

      <div id="auth-container">
        <div id="login_section" class="auth-section active">
          <h2>Login</h2>
          <form id="login-form">
            <label for="login-email">Email:</label><br />
            <input
              type="email"
              id="login-email"
              name="email"
              placeholder="Enter your email"
              required
            /><br /><br />

            <label for="login-password">Password:</label><br />
            <input
              type="password"
              id="login-password"
              name="password"
              placeholder="Enter your password"
              required
            /><br /><br />

            <button type="submit">Login</button>
          </form>
        </div>

        <div id="signup_section" class="auth-section">
          <h2>Create Account</h2>
          <form id="signup-form">
            <label for="signup-name">Name:</label><br />
            <input
              type="text"
              id="signup-name"
              name="name"
              placeholder="Full Name"
              required
            /><br /><br />

            <label for="signup-email">Email:</label><br />
            <input
              type="email"
              id="signup-email"
              name="email"
              placeholder="Email Address"
              required
            /><br /><br />

            <label for="signup-password">Password:</label><br />
            <input
              type="password"
              id="signup-password"
              name="password"
              placeholder="Create Password"
              required
            /><br /><br />

            <button type="submit">Sign Up</button>
          </form>
        </div>
      </div>
    </div>

    <script src="./Frontend/main/script.js"></script>
  </body>
</html>
