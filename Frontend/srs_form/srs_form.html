<!DOCTYPE html>
<html>

<head>
    <title>SRS Editor</title>
    <link rel="stylesheet" href="srs.css">
</head>

<body>

    <div id="container">

        <div id="header">
            <h1 id="srs-title">Edit SRS</h1>
        </div>

        <div id="navigation">
            <button onclick="location.href='../dashboard/dashboard.html'">
                Back to Dashboard
            </button>
            <button onclick="location.href='../preview/preview.html'">
                Preview SRS
            </button>
        </div>

        <div id="save-status" style="text-align: right; color: #666; font-size: 0.9rem; margin-top: 10px;">
            All changes saved.
        </div>

        <hr>

        <form id="srs-form" action="/save_srs" method="POST">

            <input type="hidden" name="projectIndex" id="projectIndex">

            <div class="section">
                <h2>1. Introduction</h2>

                <label>1.1 Purpose</label><br>
                <textarea name="purpose">placeholder</textarea><br><br>

                <label>1.2 Document Conventions</label><br>
                <textarea name="conventions">placeholder</textarea><br><br>

                <label>1.3 Intended Audience</label><br>
                <textarea name="audience">placeholder</textarea><br><br>

                <label>1.4 Scope</label><br>
                <textarea name="scope">placeholder</textarea><br><br>

                <label>1.5 References</label><br>
                <textarea name="references">placeholder</textarea><br><br>
            </div>

            <hr>

            <div class="section">
                <h2>2. Overall Description</h2>

                <label>2.1 Product Perspective</label><br>
                <textarea name="perspective"></textarea><br><br>

                <label>2.2 Product Functions</label><br>
                <textarea name="functions"></textarea><br><br>

                <label>2.3 User Classes</label><br>
                <textarea name="user_classes">placeholder</textarea><br><br>

                <label>2.4 Operating Environment</label><br>
                <textarea name="environment">placeholder</textarea><br><br>

                <label>2.5 Constraints</label><br>
                <textarea name="constraints">placeholder</textarea><br><br>

                <label>2.6 Assumptions</label><br>
                <textarea name="assumptions">placeholder</textarea><br><br>
            </div>

            <hr>

            <div class="section">
                <h2>3. Functional Requirements</h2>
                <textarea name="functional_requirements"></textarea><br><br>

                <label>System Features</label><br>
                <textarea name="system_features">placeholder</textarea>
            </div>

            <hr>

            <div class="section">
                <h2>4. Non Functional Requirements</h2>
                <textarea name="nonfunctional_requirements"></textarea><br><br>

                <label>Performance</label><br>
                <textarea name="performance">placeholder</textarea><br><br>

                <label>Security</label><br>
                <textarea name="security">placeholder</textarea><br><br>

                <label>Quality Attributes</label><br>
                <textarea name="quality">placeholder</textarea>
            </div>

            <hr>

            <div class="section">
                <h2>5. External Interface Requirements</h2>

                <label>User Interface</label><br>
                <textarea name="ui">placeholder</textarea><br><br>

                <label>Hardware Interface</label><br>
                <textarea name="hardware">placeholder</textarea><br><br>

                <label>Software Interface</label><br>
                <textarea name="software">placeholder</textarea><br><br>

                <label>Communication Interface</label><br>
                <textarea name="communication">placeholder</textarea>
            </div>

            <hr>

            <div class="section">
                <h2>6. Other Requirements</h2>
                <textarea name="other">placeholder</textarea>
            </div>

            <br>
            <button type="submit">Save Progress</button>

        </form>

    </div>

    <script src="srs.js"></script>

</body>

</html>
