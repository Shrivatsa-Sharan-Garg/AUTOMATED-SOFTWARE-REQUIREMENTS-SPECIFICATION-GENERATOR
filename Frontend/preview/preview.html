<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SRS Preview</title>
    <link rel="stylesheet" href="preview.css" />
  </head>
  <body>
    <div id="container">
      <div id="header" class="no-print">
        <h1 id="preview-title">SRS Preview</h1>
      </div>

      <div id="navigation" class="no-print">
        <button onclick="location.href = '../srs_form/srs_form.html'">
          Edit Again
        </button>
        <button onclick="location.href = '../dashboard/dashboard.html'">
          Dashboard
        </button>
        <button onclick="downloadAsDoc()" class="export-btn">
          Download .DOC
        </button>
        <button onclick="window.print()" class="export-btn">
          Print to PDF
        </button>
      </div>

      <hr class="no-print" />

      <div id="preview_content" class="document-page">
        <p>Loading document data...</p>
      </div>
    </div>

    <script src="preview.js"></script>
  </body>
</html>
